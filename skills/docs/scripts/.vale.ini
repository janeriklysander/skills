# Vale configuration for documentation skill
# See https://vale.sh/docs/topics/config/

StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = Google, write-good

Vocab = Docs

[*.md]
BasedOnStyles = Vale, Google, write-good

# --- Disabled rules ---

# We intentionally use spaced em dashes ( — ) for raw markdown readability
Google.EmDash = NO

# Title case is acceptable for headings in our docs
Google.Headings = NO

# Acronyms: flag as suggestion so the agent can judge based on audience
Google.Acronyms = suggestion

# Parenthetical clarifications: flag but don't block
Google.Parens = suggestion

# "We" is allowed when referring to the authoring organization
Google.We = NO

# First person is acceptable in conversational docs
Google.FirstPerson = NO

# Colons: flag but don't block — some template patterns use colons intentionally
Google.Colons = suggestion

# Ellipses: flag but don't block — code placeholders use them
Google.Ellipses = suggestion

# Quotes style varies — don't enforce US punctuation rules
Google.Quotes = NO

# E-Prime (flagging all "to be" verbs) is too aggressive
write-good.E-Prime = NO

# "So" at the start of sentences is fine in conversational tone
write-good.So = NO

# --- Relaxed rules ---

# Passive voice: flag but don't block
Google.Passive = suggestion
write-good.Passive = suggestion

# Wordiness: flag but don't block
write-good.TooWordy = suggestion

# Weasel words: flag but don't block
write-good.Weasel = suggestion
